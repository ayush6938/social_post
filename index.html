<!DOCTYPE html>
<html>
<head>
    <title>AI LinkedIn Post Generator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            text-align: center;
        }

        .container {
            width: 60%;
            margin: auto;
            margin-top: 50px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input {
            padding: 10px;
            width: 60%;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            margin-left: 10px;
            border: none;
            border-radius: 5px;
            background: #0073b1;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #005582;
        }

        #output {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 5px;
        }

        #copyBtn {
            margin-top: 10px;
            display: none;
            background: green;
        }

        .history {
            margin-top: 30px;
        }

        .card {
            background: #ffffff;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            text-align: left;
            border-left: 4px solid #0073b1;
        }

        /* Spinner */
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #0073b1;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: auto;
            margin-top: 10px;
            display: none;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>🚀 LinkedIn Post Generator</h1>

        <input type="text" id="topic" placeholder="Enter topic..." />
        <button onclick="generatePost()">Generate</button>

        <div class="loader" id="loader"></div>

        <div id="output"></div>
        <button id="copyBtn" onclick="copyPost()">Copy Post</button>

        <div class="history">
            <h3>History</h3>
            <div id="history"></div>
        </div>

    </div>

<script>

async function generatePost() {
    const topic = document.getElementById("topic").value;

    document.getElementById("loader").style.display = "block";
    document.getElementById("output").innerText = "";
    document.getElementById("copyBtn").style.display = "none";

    const response = await fetch("https://social-post-83jw.onrender.com/generate-post", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ topic: topic })
    });

    const data = await response.json();

    document.getElementById("loader").style.display = "none";

    if (data.success) {
        document.getElementById("output").innerText = data.data.post;
        document.getElementById("copyBtn").style.display = "inline";
        loadHistory();
    } else {
        document.getElementById("output").innerText = data.message;
    }
}

function copyPost() {
    const text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

async function loadHistory() {
    const response = await fetch("https://social-post-83jw.onrender.com/generate-post");
    const data = await response.json();

    let historyHTML = "";

    data.reverse().forEach(item => {
        historyHTML += `
            <div class="card">
                <b>${item.topic}</b><br/>
                ${item.post}
            </div>
        `;
    });

    document.getElementById("history").innerHTML = historyHTML;
}

loadHistory();

</script>

</body>
</html>
