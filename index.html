<!DOCTYPE html>
<html>
<head>
    <title>LinkedIn Post Generator</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: none;
            margin: 5px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>🚀 LinkedIn Post Generator</h1>

    <!-- 🔹 Generate -->
    <input type="text" id="topic" placeholder="Enter topic..." />
    <br>

    <button onclick="generatePost()">Generate</button>
    <button onclick="loadFavorites()">Favorites ⭐</button>
    <button onclick="loadHistory()">History</button>

    <br><br>

    <!-- 🔹 Search -->
    <input type="text" id="searchBox" placeholder="Search topic..." />
    <button onclick="searchPosts()">Search 🔍</button>

    <br><br>

    <!-- 🔹 Analytics + Export -->
    <button onclick="loadAnalytics()">Analytics 📊</button>
    <button onclick="exportJSON()">Export JSON 📁</button>
    <button onclick="exportTXT()">Export TXT 📝</button>

    <div id="result"></div>

    <script>
        const API = "https://social-post-83jw.onrender.com";

        // 🔹 Generate Post
        async function generatePost() {
            const topic = document.getElementById("topic").value;

            const res = await fetch(`${API}/generate-post`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ topic })
            });

            const data = await res.json();

            if (!data.success) {
                document.getElementById("result").innerHTML = data.message;
                return;
            }

            const post = data.data;

            document.getElementById("result").innerHTML = `
                <div class="card">
                    <p>${post.post}</p>
                    <p>🔥 Score: ${post.score}</p>
                    <button onclick="favorite('${post.id}')">⭐ Favorite</button>
                </div>
            `;
        }

        // 🔹 Favorite
        async function favorite(id) {
            await fetch(`${API}/favorite/${id}`, {
                method: "POST"
            });
            alert("Added to favorites ⭐");
        }

        // 🔹 Unfavorite
        async function unfavorite(id) {
            await fetch(`${API}/unfavorite/${id}`, {
                method: "POST"
            });
            loadFavorites();
        }

        // 🔹 Load Favorites
        async function loadFavorites() {
            const res = await fetch(`${API}/favorites`);
            const data = await res.json();

            if (!data.data || data.data.length === 0) {
                document.getElementById("result").innerHTML = "No favorites yet 😢";
                return;
            }

            renderPosts(data.data, true);
        }

        // 🔹 Load History
        async function loadHistory() {
            const res = await fetch(`${API}/posts`);
            const data = await res.json();

            renderPosts(data);
        }

        // 🔹 Search
        async function searchPosts() {
            const query = document.getElementById("searchBox").value;

            const res = await fetch(`${API}/search?query=${query}`);
            const data = await res.json();

            renderPosts(data);
        }

        // 🔹 Analytics
        async function loadAnalytics() {
            const res = await fetch(`${API}/analytics`);
            const data = await res.json();

            document.getElementById("result").innerHTML = `
                <div class="card">
                    <h3>📊 Analytics</h3>
                    <p>Total Posts: ${data.total_posts}</p>
                    <p>Average Score: ${data.avg_score}</p>
                    <p>Best Score: ${data.max_score}</p>
                </div>
            `;
        }

        // 🔹 Export JSON
        function exportJSON() {
            window.location.href = `${API}/export`;
        }

        // 🔹 Export TXT
        function exportTXT() {
            window.location.href = `${API}/export/text`;
        }

        // 🔹 Reusable Renderer ⭐
        function renderPosts(posts, showRemove = false) {
            if (!posts || posts.length === 0) {
                document.getElementById("result").innerHTML = "No results 😢";
                return;
            }

            let html = "";

            posts.forEach(p => {
                html += `
                    <div class="card">
                        <p>${p.post}</p>
                        <p>🔥 Score: ${p.score}</p>
                        ${
                            showRemove
                            ? `<button onclick="unfavorite('${p._id}')">❌ Remove</button>`
                            : ""
                        }
                    </div>
                `;
            });

            document.getElementById("result").innerHTML = html;
        }

    </script>

</body>
</html
